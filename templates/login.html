<!DOCTYPE html>
<html>
<head>
<title>Login - Competency System</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Arial, sans-serif;
    }

    /* 🌈 MODERN BACKGROUND */
    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

        background: linear-gradient(135deg, #4f46e5, #06b6d4);
    }

    /* GLASS CARD */
    .box {
        width: 380px;
        padding: 40px;

        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(10px);

        border-radius: 18px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.25);
        text-align: center;
    }

    h2 {
        font-size: 28px;
        color: #0f172a;
        font-weight: 800;
    }

    p {
        margin-top: 6px;
        margin-bottom: 25px;
        font-size: 14px;
        color: #64748b;
    }

    label {
        display: block;
        text-align: left;
        margin-top: 12px;
        font-weight: 600;
        font-size: 13px;
        color: #334155;
    }

    input {
        width: 100%;
        padding: 13px;
        margin-top: 6px;

        border: 1px solid #e2e8f0;
        border-radius: 10px;

        background: #f8fafc;
        font-size: 14px;

        transition: 0.2s;
    }

    input:focus {
        border-color: #06b6d4;
        box-shadow: 0 0 0 3px rgba(6,182,212,0.2);
        outline: none;
        background: white;
    }

    /* OPTIONS */
    .options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 12px;
        font-size: 13px;
    }

    .remember {
        display: flex;
        align-items: center;
        gap: 6px;
        color: #475569;
    }

    .options a {
        color: #06b6d4;
        text-decoration: none;
        font-weight: 600;
    }

    .options a:hover {
        text-decoration: underline;
    }

    /* BUTTON */
    button {
        width: 100%;
        padding: 13px;
        margin-top: 18px;

        border: none;
        border-radius: 10px;

        background: #06b6d4;
        color: white;

        font-size: 15px;
        font-weight: 700;

        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #0891b2;
    }

    /* BOTTOM TEXT */
    .bottom {
        margin-top: 18px;
        font-size: 13px;
        color: #475569;
    }

    .bottom a {
        color: #06b6d4;
        font-weight: 700;
        text-decoration: none;
    }

    .bottom a:hover {
        text-decoration: underline;
    }

</style>
</head>

<body>

<div class="box">

    <h2>Competency Assessment System</h2>
    <p>AI-powered learning & evaluation platform</p>

    <form method="POST" autocomplete="off">

        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>

        <div class="options">

            <label class="remember">
                <input type="checkbox" name="remember">
                Remember me
            </label>

            <a href="/forgot-password">Forgot password?</a>

        </div>

        <button type="submit">Login</button>

    </form>

    <div class="bottom">
        Don't have an account?
        <a href="/register">Create account</a>
    </div>

</div>

</body>
</html>
