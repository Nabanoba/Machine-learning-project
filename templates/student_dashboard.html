<!DOCTYPE html>
<html>
<head>
    <title>My Assigned Questions</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
        }

        .nav-buttons {
            position: absolute;
            left: 15px;
            top: 15px;
        }

        .nav-buttons a {
            background: white;
            color: #2c3e50;
            padding: 6px 10px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 13px;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 15px auto;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            max-width: 800px;
        }

        .question {
            font-size: 16px;
            margin-bottom: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 10px;
            padding: 10px 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .empty {
            text-align: center;
            color: gray;
            margin-top: 50px;
        }
    </style>
</head>

<body>

<div class="header">
    <div class="nav-buttons">
        <a href="/logout">Logout</a>
    </div>
    <h1>My Assigned Questions</h1>
</div>

<div class="container">

    {% if questions|length == 0 %}
        <div class="empty">
            <h3>No questions assigned yet</h3>
        </div>
    {% endif %}

    {% for q in questions %}
        <div class="card">

            <div class="question">
                <b>Question:</b><br>
                {{ q.item }}
            </div>

            <!-- ✅ CORRECT FORM -->
            <form method="POST" action="/evaluate">

                <input type="hidden" name="question" value="{{ q.item }}">
                <input type="hidden" name="item_id" value="{{ q.item_id }}">

                <input type="text" name="answer" placeholder="Type your answer here..." required>

                <button type="submit">Submit Answer</button>

            </form>

        </div>
    {% endfor %}

</div>

</body>
</html>
