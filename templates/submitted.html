<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submission Successful</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0f2fe, #f8fafc);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 420px;
            width: 90%;
            animation: fadeIn 0.6s ease-in-out;
        }

        .icon {
            font-size: 60px;
            color: #22c55e;
            margin-bottom: 15px;
        }

        h1 {
            color: #0f172a;
            margin-bottom: 10px;
        }

        p {
            color: #475569;
            font-size: 15px;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 12px 20px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .secondary {
            display: block;
            margin-top: 12px;
            font-size: 13px;
            color: #64748b;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(15px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="card">

    <div class="icon">✅</div>

    <h1>Answer Submitted</h1>

    <p>Your answer has been recorded successfully.</p>

    <a href="/login" class="btn">Go to Login</a>

    

</div>

</body>
</html>
